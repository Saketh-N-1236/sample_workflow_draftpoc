# Language Configuration File
# Defines language-specific rules for parsing, test discovery, and analysis

languages:
  python:
    extensions: [.py]
    test_patterns:
      - "test_*.py"
      - "*_test.py"
    test_frameworks:
      - pytest
      - unittest
      - nose
    test_method_prefix: "test_"
    test_class_prefix: "Test"
    parser_module: "parsers.python_parser"
    parser_class: "PythonParser"
    syntax_patterns:
      class: "^\\+.*class\\s+(\\w+)"
      function: "^\\+.*def\\s+(\\w+)"
    module_resolution:
      style: "dot_notation"
      remove_prefixes: ["backend."]
    test_directories:
      - "test"
      - "tests"
      - "unit"
      - "integration"
      - "e2e"
    
  # Java configuration (for future implementation)
  java:
    extensions: [.java]
    test_patterns:
      - "*Test.java"
      - "*Tests.java"
      - "Test*.java"
    test_frameworks:
      - junit
      - testng
      - spock
    test_method_prefix: "test"
    test_class_suffix: "Test"
    parser_module: "parsers.java_parser"
    parser_class: "JavaParser"
    syntax_patterns:
      class: "^\\+.*class\\s+(\\w+)"
      function: "^\\+.*(?:public|private|protected)?\\s*\\w*\\s*(\\w+)\\s*\\("
    module_resolution:
      style: "package_notation"
      source_dirs: ["src/main/java", "src"]
    test_directories:
      - "src/test/java"
      - "test"
    
  # TypeScript configuration (for future implementation)
  typescript:
    extensions: [.ts, .tsx]
    test_patterns:
      - "*.test.ts"
      - "*.test.tsx"
      - "*.spec.ts"
      - "*.spec.tsx"
    test_frameworks:
      - jest
      - mocha
      - vitest
    test_method_prefix: "test"
    parser_module: "parsers.typescript_parser"
    parser_class: "TypeScriptParser"
    syntax_patterns:
      class: "^\\+.*class\\s+(\\w+)"
      function: "^\\+.*(?:export\\s+)?(?:async\\s+)?function\\s+(\\w+)"
    module_resolution:
      style: "es6_import"
      base_path: "src"
    test_directories:
      - "__tests__"
      - "test"
      - "tests"
    
  # JavaScript configuration (for future implementation)
  javascript:
    extensions: [.js, .jsx]
    test_patterns:
      - "*.test.js"
      - "*.test.jsx"
      - "*.spec.js"
      - "*.spec.jsx"
    test_frameworks:
      - jest
      - mocha
    parser_module: "parsers.javascript_parser"
    parser_class: "JavaScriptParser"
